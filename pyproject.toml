[project]
name = "natal-core"
version = "0.1.0"
description = "Numba-Accelerated Toolbox for Analysis of Lifecycle-based population genetic dynamics"
readme = "README.md"
authors = [
    { name = "Jinyu Zhu", email = "jyzhu_2020@stu.pku.edu.cn" }
]
requires-python = ">=3.12"
dependencies = [
    "nicegui[highcharts]>=3.9.0",
    "numba>=0.64.0",
    "numpy>=2.4.2",
    "pandas>=2.3.3",
    "plotly>=6.6.0",
    "scipy>=1.17.1",
    "streamlit>=1.55.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/natal"]
