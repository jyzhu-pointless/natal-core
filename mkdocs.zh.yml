site_name: NATAL Core 中文文档
site_description: 用于生命周期建模分析的 Numba 加速工具包
site_author: Jinyu Zhu

docs_dir: docs/zh

repo_url: https://github.com/jyzhu-pointless/natal-core
repo_name: jyzhu-pointless/natal-core

watch:
  - src/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

markdown_extensions:
  - toc:
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - autorefs:
      resolve_closest: true
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: table
            show_root_heading: true
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            heading_level: 2
            merge_init_into_class: true
            show_if_no_docstring: false
            show_submodules: false
            show_object_full_path: false
            group_by_category: true
            members_order: source
            inherited_members: false
            filters:
              - "!^_"
            warn_no_docstring: true

nav:
  - 首页: index.md
  - 快速开始: 1_quickstart.md
  - 实用组件:
    - 2_genetics.md
    - 2_population.md
    - 2_population_initialization.md
    - 2_data_output.md
    - 2_genetic_presets.md
    - 2_hooks.md
    - 2_genotype_patterns.md
  - 进阶指南:
    - 3_custom_presets.md
    - 3_advanced_hooks.md
    - 3_modifiers.md
    - 3_spatial_simulation.md
  - 内部实现:
    - 4_index_registry.md
    - 4_simulation_kernels.md
    - 4_numba_optimization.md
    - 4_population_state_config.md
  - API 参考:
    - API 概览: api/index.md
    - 遗传实体: api/genetic_entities.md
    - 遗传结构: api/genetic_structures.md
    - 遗传模式: api/genetic_patterns.md
    - 遗传预设: api/genetic_presets.md
    - 种群状态: api/population_state.md
    - 状态转换: api/state_translation.md
    - 种群配置: api/population_config.md
    - 基础种群: api/base_population.md
    - 离散代种群: api/discrete_generation_population.md
    - 年龄结构种群: api/age_structured_population.md
    - 种群构建器: api/population_builder.md
    - 修饰器: api/modifiers.md
    - Hook DSL: api/hook_dsl.md
    - 模拟内核: api/simulation_kernels.md
    - 算法: api/algorithms.md
