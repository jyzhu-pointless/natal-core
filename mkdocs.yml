site_name: NATAL Core Documentation
site_description: Numba-Accelerated Toolkit for Analysis of Lifecycles
site_author: Jinyu Zhu

repo_url: https://github.com/jyzhu-pointless/natal-core
repo_name: jyzhu-pointless/natal-core

watch:
  - src/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: table
            show_root_heading: true
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            heading_level: 2
            merge_init_into_class: true
            show_if_no_docstring: false
            show_submodules: false
            show_object_full_path: false
            group_by_category: true
            members_order: source
            inherited_members: false
            filters:
              - "!^_"
            warn_no_docstring: true

nav:
  - Home: index.md
  - Guides:
    - Quickstart: quickstart.md
    - Genetic Structures: genetic_structures.md
    - Builder System: builder_system.md
    - Index Registry: index_registry.md
    - Population State & Config: population_state_config.md
    - Simulation Kernels: simulation_kernels.md
    - Numba Optimization: numba_optimization.md
    - Modifiers: modifiers.md
    - Hooks: hooks.md
    - Genetic Presets: genetic_presets.md
    - Spatial Simulation Guide: spatial_simulation_guide.md
    - Observation Rules: observation_rules.md
    - Genotype Pattern Matching: genotype_pattern_matching_design.md
    - Allele Conversion Rules: allele_conversion_rules.md
    - Genotype Filter: genotype_filter.md
    - Preset Encapsulation Validation: preset_encapsulation_and_validation.md
  - API Reference:
    - Overview: api/index.md
    - genetic_structures: api/genetic_structures.md
    - genetic_entities: api/genetic_entities.md
    - population_state: api/population_state.md
    - population_config: api/population_config.md
    - base_population: api/base_population.md
    - age_structured_population: api/age_structured_population.md
    - discrete_generation_population: api/discrete_generation_population.md
    - algorithms: api/algorithms.md
    - simulation_kernels: api/simulation_kernels.md
    - population_builder: api/population_builder.md
    - genetic_patterns: api/genetic_patterns.md
    - modifiers: api/modifiers.md
    - hook_dsl: api/hook_dsl.md
    - genetic_presets: api/genetic_presets.md

extra_css:
