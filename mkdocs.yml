site_name: NATAL Core Documentation
site_description: Numba-Accelerated Toolkit for Analysis of Lifecycles
site_author: Jinyu Zhu

repo_url: https://github.com/jyzhu-pointless/natal-core
repo_name: jyzhu-pointless/natal-core

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  palette:
    - scheme: default
      primary: purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            heading_level: 3
            # Support for custom docstring formats
            parameters_key: "Args"
            examples_key: "Examples"
            raises_key: "Raises"
            # Better handling of different docstring formats
            merge_init_into_class: true
            show_if_no_docstring: false
            # Filter to only show public exports
            show_submodules: false
            show_object_full_path: false
            show_category_heading: true
            group_by_category: true
            # Respect __all__ if present, otherwise show public members
            members: null
            show_if_no_all: true
            show_inheritance: false
            filters:
              - "!^_"
            # Additional options for better display
            docstring_section_style: "spacy"
            line_length: 88

nav:
  - Home: index.md
  - API Reference:
    - genetic_structures: api/genetic_structures.md
    - genetic_entities: api/genetic_entities.md
    - population_state: api/population_state.md
    - population_config: api/population_config.md
    - base_population: api/base_population.md
    - age_structured_population: api/age_structured_population.md
    - algorithms: api/algorithms.md
    - simulation_kernels: api/simulation_kernels.md
    - population_builder: api/population_builder.md
    - genetic_patterns: api/genetic_patterns.md
    - modifiers: api/modifiers.md
    - hook_dsl: api/hook_dsl.md

extra_css: